<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dihas Nanayakkara</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: rgb(249,245,235);
  color: #0f172a;
}

header {
  text-align: center;
  padding: 60px 20px 20px;
}

h1 {
  margin: 0;
  font-size: 48px;
}

nav {
  margin-top: 20px;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: rgb(64,97,83);
  font-weight: bold;
  cursor: pointer;
}

section {
  display: none;
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

.active {
  display: block;
}

.card {
  background: rgb(64,97,83);
  color: white;
  padding: 20px;
  border-radius: 10px;
  margin-top: 15px;
  word-wrap: break-word;
}

input, textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 2px solid rgb(64,97,83);
  background: #f8fafc;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: rgb(64,97,83);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 30px;
  color: #475569;
}
</style>
</head>

<body>

<header>
<h1>Dihas Nanayakkara</h1>

<nav>
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('about')">About</a>
  <a onclick="showPage('work')">Work</a>
  <a onclick="showPage('contact')">Contact</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="active">
  <div class="card">
    Independent Research & Technology
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="card">
    Focused on physics, computation, and engineering systems.
  </div>
</section>

<!-- WORK -->
<section id="work">
  <div class="card">
    <strong>Computational Physics</strong>
    <p>Simulation and modelling of physical systems.</p>
  </div>

  <div class="card">
    <strong>Robotics</strong>
    <p>Design of assistive systems and automation.</p>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="card">
    <form action="https://formspree.io/f/xrerkopw" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</section>

<footer>
© Dihas Nanayakkara
</footer>

<script>
function showPage(pageId) {
  const sections = document.querySelectorAll("section");
  sections.forEach(sec => sec.classList.remove("active"));

  document.getElementById(pageId).classList.add("active");
}
</script>

</body>
</html>
